# .github/workflows/build.yml
name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          brew install dpkg ldid

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Download iOS SDK
        run: |
          mkdir -p $HOME/theos/sdks
          curl -L -o $HOME/sdks.zip https://github.com/theos/sdks/archive/refs/heads/master.zip
          unzip -q $HOME/sdks.zip -d $HOME/sdks_tmp
          mv $HOME/sdks_tmp/sdks-master/*.sdk $HOME/theos/sdks/ 2>/dev/null || true
          rm -rf $HOME/sdks.zip $HOME/sdks_tmp
          ls -la $HOME/theos/sdks/

      - name: Build Library
        run: |
          export THEOS=$HOME/theos
          make clean
          make
          echo "=== Output files ==="
          find . -name "*.dylib" -o -name "*.a" 2>/dev/null

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BaiduPanTroll
          path: |
            .theos/obj/**/*.dylib
            .theos/obj/**/*.a
          if-no-files-found: warn
