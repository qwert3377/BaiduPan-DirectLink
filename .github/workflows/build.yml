name: Build BaiduPanTroll

on:
  push:
    branches: [main]
    paths:
      - 'Tweak.mm'
      - 'Makefile'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Install dependencies
      run: |
        brew install ldid make
        brew install --cask homebrew/cask-versions/temurin8 || true
      
    - name: Clone Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git $HOME/theos
      
    - name: Download iOS SDK
      run: |
        curl -L -o $HOME/theos/sdks.zip https://github.com/theos/sdks/archive/refs/heads/master.zip
        unzip -q $HOME/theos/sdks.zip -d $HOME/theos/
        mv $HOME/theos/sdks-master/* $HOME/theos/sdks/ || true
        rm -rf $HOME/theos/sdks.zip $HOME/theos/sdks-master
      
    - name: Build dylib
      run: |
        export THEOS=$HOME/theos
        export PATH=$THEOS/bin:$PATH
        make clean
        make
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: BaiduPanTroll.dylib
        path: obj/BaiduPanTroll.dylib
        if-no-files-found: error

  release:
    needs: build
    runs-on: macos-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: BaiduPanTroll.dylib
        path: ./
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: BaiduPanTroll.dylib
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        body: |
          自动编译生成的 BaiduPanTroll.dylib
          
          ## 使用方法
          1. 下载 `BaiduPanTroll.dylib`
          2. 使用 TrollFools 注入百度网盘 IPA
          3. 打开 App，点击悬浮「直链」按钮
          
          ## 注意事项
          - 需要登录百度账号
          - 大文件（>150MB）需 SVIP
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
