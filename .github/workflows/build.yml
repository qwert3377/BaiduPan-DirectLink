name: Build Tweak

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Theos
      run: |
        # Clone Theos
        git clone --recursive https://github.com/theos/theos.git $HOME/theos

        # Download iOS SDK
        mkdir -p $HOME/theos/sdks
        curl -L -o $HOME/theos/sdks/iPhoneOS14.5.sdk.tbz2 https://github.com/theos/sdks/archive/refs/tags/iPhoneOS14.5.sdk.tbz2 || true

        # Alternative: use Xcode SDK
        if [ ! -d "$HOME/theos/sdks/iPhoneOS14.5.sdk" ]; then
          echo "Using Xcode SDK as fallback"
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          ln -s "$SDK_PATH" $HOME/theos/sdks/iPhoneOS.sdk
        fi

        echo "THEOS=$HOME/theos" >> $GITHUB_ENV

    - name: Build
      run: |
        export THEOS=$HOME/theos
        make clean
        make package FINALPACKAGE=1

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: BaiduPanTroll
        path: packages/*.deb
