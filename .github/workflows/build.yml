name: Build Tweak

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        brew install ldid

    - name: Setup Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git $HOME/theos
        mkdir -p $HOME/theos/sdks
        SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
        ln -s "$SDK_PATH" $HOME/theos/sdks/iPhoneOS.sdk
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV

    - name: Build
      run: |
        export THEOS=$HOME/theos
        make clean
        make
        echo "=== Finding dylib ==="
        find . -name "*.dylib" -type f 2>/dev/null
        echo "=== Theos lib dir ==="
        ls -la $HOME/theos/lib/ 2>/dev/null || true
        echo "=== Current dir ==="
        ls -la
        echo "=== obj dir ==="
        ls -la .theos/obj/ 2>/dev/null || true
        ls -la obj/ 2>/dev/null || true
        echo "=== Copy dylib to root ==="
        find . -name "BaiduPanTroll*.dylib" -type f -exec cp {} . \; 2>/dev/null || true
        ls -la *.dylib 2>/dev/null || true

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: BaiduPanTroll.dylib
        path: |
          *.dylib
          .theos/obj/**/*.dylib
          obj/**/*.dylib
        if-no-files-found: warn
